<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talks &mdash; Zihao Zhang</title>
  <link rel="stylesheet" href="/assets/css/site.css">
  <style>
    #site-main { max-width: 100%; }

    .talk-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px 24px;
      margin-top: 28px;
    }

    .talk-card {
      display: block;
      text-decoration: none;
    }

    a.talk-card:hover .talk-thumb {
      opacity: 0.85;
      transition: opacity 0.15s;
    }

    a.talk-card:hover .talk-title {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .talk-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      background: #f5f5f5;
      display: block;
    }

    .talk-title {
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 12px;
      line-height: 1.3;
    }

    .talk-meta {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    @media (max-width: 700px) {
      .talk-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="site-wrap">

    <nav id="site-nav">
      <a class="site-nav-name" href="/">Zihao Zhang</a>
      <span class="site-nav-zh">张子豪</span>
      <p class="site-nav-meta">Associate Professor<br>Landscape Architecture<br>City College of New York</p>
      <div class="site-nav-links">
        <a class="site-nav-link" href="/projects/">Projects</a>
        <a class="site-nav-link" href="/publications/">Publications</a>
        <a class="site-nav-link" href="/teaching/">Teaching</a>
        <a class="site-nav-link" href="/talks/">Talks</a>
      </div>
    </nav>

    <main id="site-main">
      <h1 class="site-title">Talks</h1>

      <div class="talk-grid">
        <a class="talk-card" href="/talks/elua/">
          <img class="talk-thumb" src="/talks/elua/slides/slide_01.webp" alt="ELUA — Ecological Laboratory for Urban Agriculture">
          <div class="talk-title">Ecological Laboratory for Urban Agriculture</div>
          <div class="talk-meta">Research lecture</div>
        </a>
        <a class="talk-card" href="/talks/cybernetics/">
          <img class="talk-thumb" src="/talks/cybernetics/slides/slide_01.webp" alt="Cybernetics">
          <div class="talk-title">Cybernetics</div>
          <div class="talk-meta">Research lecture</div>
        </a>
      </div>
    </main>

  </div>

  <script src="/assets/js/site.js"></script>
</body>
</html>

  <!-- WF badge -->
  <rect x="24" y="162" width="38" height="16" rx="2" fill="#E51937"/>
  <text x="43" y="174" font-family="'DM Mono', 'Courier New', monospace" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">WF 01</text>

  <!-- Title -->
  <text x="24" y="193" font-family="'DM Mono', 'Courier New', monospace" font-size="10" fill="#888" letter-spacing="0.08em" text-anchor="start">AUTOCAD SITE DRAFTING</text>

  <!-- Large label -->
  <text x="160" y="90" font-family="'DM Mono', 'Courier New', monospace" font-size="32" fill="#fff" text-anchor="middle" font-weight="700" opacity="0.08">AUTOCAD</text>
</svg>

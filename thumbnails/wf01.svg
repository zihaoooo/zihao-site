<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#1a1a1a"/>

  <!-- Accent bar -->
  <rect x="0" y="152" width="320" height="3" fill="#E51937"/>

  <!-- Grid linework decoration -->
  <line x1="40" y1="40" x2="280" y2="40" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="40" y1="70" x2="280" y2="70" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="40" y1="100" x2="280" y2="100" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="40" y1="130" x2="280" y2="130" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="40" y1="40" x2="40" y2="130" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="100" y1="40" x2="100" y2="130" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="160" y1="40" x2="160" y2="130" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="220" y1="40" x2="220" y2="130" stroke="#2a2a2a" stroke-width="0.5"/>
  <line x1="280" y1="40" x2="280" y2="130" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- Site boundary highlight -->

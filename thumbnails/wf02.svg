<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Background split -->
  <rect width="320" height="200" fill="#001E36"/>
  <rect x="213" width="107" height="200" fill="#49021F"/>

  <!-- Vertical dividers -->
  <line x1="107" y1="30" x2="107" y2="145" stroke="#1a3a52" stroke-width="1"/>
  <line x1="213" y1="30" x2="213" y2="145" stroke="#3a0118" stroke-width="1"/>

  <!-- App nodes -->
  <!-- SCAN -->
  <rect x="18" y="74" width="71" height="52" rx="3" fill="none" stroke="#334" stroke-width="1"/>
  <text x="53.5" y="95" font-family="'DM Mono', 'Courier New', monospace" font-size="8" fill="#558" text-anchor="middle" letter-spacing="0.05em">SCAN</text>
  <text x="53.5" y="108" font-family="'DM Mono', 'Courier New', monospace" font-size="7" fill="#446" text-anchor="middle">→ JPEG</text>
  <text x="53.5" y="119" font-family="'DM Mono', 'Courier New', monospace" font-size="7" fill="#446" text-anchor="middle">300 DPI</text>

  <!-- Arrow 1 -->
  <line x1="91" y1="100" x2="105" y2="100" stroke="#31A8FF" stroke-width="1.5"/>
  <polygon points="105,97 109,100 105,103" fill="#31A8FF"/>

  <!-- PS node -->
  <rect x="124" y="74" width="71" height="52" rx="3" fill="#0a2844"/>
  <circle cx="159.5" cy="100" r="18" fill="#1a4060" stroke="#31A8FF" stroke-width="1.5"/>
  <text x="159.5" y="105" font-family="'Arial', sans-serif" font-size="13" fill="#31A8FF" text-anchor="middle" font-weight="700">Ps</text>

  <!-- Arrow 2 -->
  <line x1="197" y1="100" x2="211" y2="100" stroke="#FF3366" stroke-width="1.5"/>
  <polygon points="211,97 215,100 211,103" fill="#FF3366"/>

  <!-- ID node -->
  <rect x="230" y="74" width="71" height="52" rx="3" fill="#300014"/>
  <circle cx="265.5" cy="100" r="18" fill="#4a0020" stroke="#FF3366" stroke-width="1.5"/>
  <text x="265.5" y="105" font-family="'Arial', sans-serif" font-size="13" fill="#FF3366" text-anchor="middle" font-weight="700">Id</text>

  <!-- Bottom bar -->
  <rect x="0" y="152" width="160" height="3" fill="#31A8FF"/>
  <rect x="160" y="152" width="160" height="3" fill="#FF3366"/>

  <!-- WF badge -->
  <rect x="24" y="162" width="38" height="16" rx="2" fill="#1a1a1a"/>
  <text x="43" y="174" font-family="'DM Mono', 'Courier New', monospace" font-size="9" fill="#fff" text-anchor="middle" font-weight="700">WF 02</text>

  <!-- Title -->
  <text x="24" y="193" font-family="'DM Mono', 'Courier New', monospace" font-size="10" fill="#558" letter-spacing="0.06em" text-anchor="start">HAND SKETCH → PORTFOLIO</text>
</svg>

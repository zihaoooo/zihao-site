<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#2a2a2a"/>

  <!-- Diagonal hatching -->
  <defs>
    <pattern id="hatch04" patternUnits="userSpaceOnUse" width="12" height="12" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="rgba(255,255,255,0.03)" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="320" height="200" fill="url(#hatch04)"/>

  <!-- Center content -->
  <text x="160" y="90" font-family="'DM Mono', 'Courier New', monospace" font-size="11" fill="#555" text-anchor="middle" letter-spacing="0.2em">COMING SOON</text>
  <line x1="100" y1="100" x2="220" y2="100" stroke="#3a3a3a" stroke-width="1"/>
  <text x="160" y="116" font-family="'DM Mono', 'Courier New', monospace" font-size="9" fill="#444" text-anchor="middle" letter-spacing="0.12em">WORKFLOW 04</text>

  <!-- WF badge -->
  <rect x="24" y="162" width="38" height="16" rx="2" fill="#3a3a3a"/>
  <text x="43" y="174" font-family="'DM Mono', 'Courier New', monospace" font-size="9" fill="#666" text-anchor="middle" font-weight="700">WF 04</text>

  <!-- Title -->
  <text x="24" y="193" font-family="'DM Mono', 'Courier New', monospace" font-size="10" fill="#444" letter-spacing="0.08em" text-anchor="start">— UNDER DEVELOPMENT —</text>
</svg>

  ═══════════════════════════════════════════ -->

  <!-- Base wires: dark blue-purple -->
  <g stroke="#2a2a6a" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 193,127 C 244,127 244,120 295,120"/>
    <path d="M 391,127 C 451,127 451,127 510,127"/>
    <path d="M 193,127 C 228,127 228,282 200,282"/>
    <path d="M 391,127 C 435,127 435,282 400,282"/>
    <path d="M 300,282 C 350,282 350,282 400,282"/>
    <path d="M 478,282 C 534,282 534,282 590,282"/>
    <path d="M 610,127 C 645,127 618,282 590,282"/>
    <path d="M 118,427 C 162,427 162,271 200,271"/>
    <path d="M 678,282 C 710,282 710,182 700,182"/>
    <path d="M 118,427 C 125,427 125,510 133,510"/>
    <path d="M 213,510 C 253,510 253,510 293,510"/>
    <path d="M 405,510 C 445,510 445,510 480,510"/>
    <path d="M 250,304 C 260,380 275,440 293,497"/>
    <path d="M 576,510 C 620,510 630,510 658,510"/>

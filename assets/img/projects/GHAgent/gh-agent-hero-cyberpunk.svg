<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Grid dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.1" fill="#1c1c48"/>
    </pattern>
    <!-- Scan line overlay -->
    <pattern id="scan" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#000" opacity="0.08"/>
    </pattern>

    <!-- Ambient glows -->
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f000d0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f000d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7700ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7700ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Ghost wire gradients -->
    <linearGradient id="ghost1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f000d0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f000d0" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="ghost2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="ghost3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f000d0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f000d0" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="675" fill="#080812"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <rect width="1200" height="675" fill="url(#scan)"/>

  <!-- ── Ambient glows ── -->
  <ellipse cx="200" cy="200" rx="320" ry="220" fill="url(#glowCyan)"/>
  <ellipse cx="880" cy="295" rx="280" ry="200" fill="url(#glowMagenta)"/>
  <ellipse cx="500" cy="530" rx="260" ry="180" fill="url(#glowPurple)"/>

  <!-- ── Subtle horizon line ── -->

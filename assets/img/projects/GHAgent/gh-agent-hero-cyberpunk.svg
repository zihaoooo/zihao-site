    <path d="M 193,127 C 244,127 244,120 295,120" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
    <path d="M 300,282 C 350,282 350,282 400,282" stroke="#f000d0" stroke-width="1" opacity="0.35"/>
    <path d="M 478,282 C 534,282 534,282 590,282" stroke="#f5e100" stroke-width="1" opacity="0.25"/>

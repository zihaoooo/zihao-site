    <path d="M 760,295 C 680,295 580,127 391,127" stroke="url(#ghost2)" stroke-width="1.8"/>
    <path d="M 760,295 C 745,295 730,282 678,282" stroke="url(#ghost3)" stroke-width="2.2"/>
